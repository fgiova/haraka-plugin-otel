; @fgiova/haraka-otel
; OpenTelemetry tracing/metrics plugin
;
; PRECEDENCE: when both this file and the corresponding OTEL_* / DD_* env var
; are set, the value in this file WINS. For multi-value sections
; ([exporter.headers], [resource]) the merge is per-key: cfg keys override
; env keys with the same name; env keys not present in cfg are kept.
;
; The bundled NodeSDK is initialized only when at least one OTLP endpoint is
; configured (here or via env). With no endpoint, hooks still run but signals
; route to the globally configured provider (e.g. dd-trace).

[main]

; master kill-switch. false = plugin loaded but no hooks registered
; (process restart required to re-enable)
+enabled

; include RFC822 Message-Id as smtp.message.id span attribute (PII concern)
+include_message_id

; include HELO/EHLO greeting as smtp.helo span attribute (may leak internal hostname)
+include_helo

; include comma-joined recipient domains as smtp.rcpt.domains span attribute
+include_rcpt_domains

; include SPF/DKIM/DMARC results as span attributes
+include_auth_results

[otel]

; service.name reported in the SDK Resource (default "haraka")
;service_name = haraka

; sampler name. Recognized:
;   always_on | always_off | traceidratio
;   parentbased_always_on | parentbased_always_off | parentbased_traceidratio
;service_name =
;traces_sampler = parentbased_always_on

; numeric argument for ratio-based samplers (0.0 - 1.0)
;traces_sampler_arg = 1.0

; "none" disables metrics export entirely (regardless of metrics_endpoint)
;metrics_exporter =

; periodic metric export interval in ms (default 60000)
;metric_export_interval = 60000

[exporter]

; base OTLP endpoint, applies to both signals unless overridden below.
; Trace path is endpoint + /v1/traces, metrics path is endpoint + /v1/metrics.
;endpoint = http://otel-collector:4318

; traces-only full URL (overrides endpoint for traces)
;traces_endpoint = http://otel-collector:4318/v1/traces

; metrics-only full URL (overrides endpoint for metrics)
;metrics_endpoint = http://otel-collector:4318/v1/metrics

[exporter.headers]

; one header per line. Applied to both trace and metric exporters.
; Merged with OTEL_EXPORTER_OTLP_HEADERS env (cfg wins per key).
;authorization = Bearer xxx
;x-tenant-id = abc

[resource]

; one resource attribute per line. Merged into the SDK Resource.
; Merged with OTEL_RESOURCE_ATTRIBUTES env (cfg wins per key).
;deployment.environment = prod
;service.version = 1.2.3